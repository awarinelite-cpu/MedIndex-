<svg xmlns='http://www.w3.org/2000/svg' width='512' height='512' viewBox='0 0 512 512'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%'  stop-color='#1e40af'/>
      <stop offset='100%' stop-color='#1e3a8a'/>
    </linearGradient>
    <clipPath id='circ'>
      <circle cx='256' cy='256' r='235.52'/>
    </clipPath>
  </defs>
  <!-- Background circle -->
  <circle cx='256' cy='256' r='235.52' fill='url(#bg)'/>
  <!-- White pill shape, rotated 45deg -->
  <g transform='rotate(45 256 256)' clip-path='url(#circ)'>
    <rect x='122.88' y='204.8' width='266.24' height='102.4' rx='51.2' fill='white'/>
    <!-- Split line -->
    <line x1='256' y1='204.8' x2='256' y2='307.2' stroke='#1e3a8a' stroke-width='7.68'/>
    <!-- Left half tint -->
    <rect x='122.88' y='204.8' width='133.12' height='102.4' rx='51.2' fill='#93c5fd' opacity='0.5'/>
  </g>
</svg>