<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e3a8a" />
  <title>Offline — MedIndex</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.20);
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 380px;
      width: 100%;
    }
    .pill-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      display: block;
    }
    h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 12px; }
    p  { font-size: 0.95rem; color: rgba(255,255,255,0.80); line-height: 1.6; margin-bottom: 28px; }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.8rem;
      margin-bottom: 28px;
      letter-spacing: 0.04em;
    }
    button {
      background: white;
      color: #1e3a8a;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    .note {
      margin-top: 20px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.55);
    }
  </style>
</head>
<body>
  <div class="card">
    <svg class="pill-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <circle cx="40" cy="40" r="37" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <g transform="rotate(45 40 40)">
        <rect x="18" y="32" width="44" height="16" rx="8" fill="white" opacity="0.9"/>
        <line x1="40" y1="32" x2="40" y2="48" stroke="#1e3a8a" stroke-width="1.5"/>
        <rect x="18" y="32" width="22" height="16" rx="8" fill="#93c5fd" opacity="0.6"/>
      </g>
    </svg>

    <div class="badge">📡 No Internet Connection</div>

    <h1>You're Offline</h1>
    <p>
      MedIndex works offline — but your browser needs to load the app
      at least once while connected. Once cached, all 280 drugs are available
      without any internet connection.
    </p>

    <button onclick="window.location.reload()">Try Again</button>

    <p class="note">
      💊 All drug data is stored locally on your device after the first visit.
    </p>
  </div>
</body>
</html>
