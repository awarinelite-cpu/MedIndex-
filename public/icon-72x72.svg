    <rect x='17.28' y='28.8' width='37.44' height='14.4' rx='7.2' fill='white'/>
    <!-- Split line -->
    <line x1='36' y1='28.8' x2='36' y2='43.2' stroke='#1e3a8a' stroke-width='1.08'/>
    <!-- Left half tint -->
    <rect x='17.28' y='28.8' width='18.72' height='14.4' rx='7.2' fill='#93c5fd' opacity='0.5'/>
