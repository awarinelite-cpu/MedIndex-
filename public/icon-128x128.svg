<svg xmlns='http://www.w3.org/2000/svg' width='128' height='128' viewBox='0 0 128 128'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%'  stop-color='#1e40af'/>
      <stop offset='100%' stop-color='#1e3a8a'/>
    </linearGradient>
    <clipPath id='circ'>
      <circle cx='64' cy='64' r='58.88'/>
    </clipPath>
  </defs>
  <!-- Background circle -->
  <circle cx='64' cy='64' r='58.88' fill='url(#bg)'/>
  <!-- White pill shape, rotated 45deg -->
  <g transform='rotate(45 64 64)' clip-path='url(#circ)'>
    <rect x='30.72' y='51.2' width='66.56' height='25.6' rx='12.8' fill='white'/>
    <!-- Split line -->
    <line x1='64' y1='51.2' x2='64' y2='76.8' stroke='#1e3a8a' stroke-width='1.92'/>
    <!-- Left half tint -->
    <rect x='30.72' y='51.2' width='33.28' height='25.6' rx='12.8' fill='#93c5fd' opacity='0.5'/>
  </g>
</svg>